{% extends "base.html" %}
{% block title %}FLoRA — FLORA{% endblock %}

{% block head %}
<style>
.flora-page  { max-width:1200px; margin:0 auto; padding:16px; }
.tab-bar     { display:flex; gap:0; border-bottom:2px solid #e2e8f0; margin-bottom:14px; }
.tab-btn     { padding:7px 14px; font-size:12px; font-weight:600; background:none;
               border:none; cursor:pointer; color:#64748b;
               border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .15s; }
.tab-btn.active { color:#2563eb; border-bottom-color:#2563eb; }
.status-bar  { display:flex; gap:6px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
.status-pill { padding:4px 10px; font-size:11px; font-weight:600; border-radius:99px;
               border:1px solid #e2e8f0; background:#fff; cursor:pointer;
               transition:all .15s; color:#64748b; }
.status-pill.active { background:#1e293b; color:#fff; border-color:#1e293b; }
.detail-row  { background:#f0f9ff; }
.detail-cell { padding:12px 16px; font-size:11px; color:#475569; }
.fpp { display:inline-flex; align-items:center; padding:2px 7px; border-radius:10px;
       font-size:10px; font-weight:600; white-space:nowrap; }
.fg  { background:#dcfce7; color:#166534; }
.fr  { background:#fee2e2; color:#991b1b; }
.fy  { background:#fef3c7; color:#92400e; }
.fb  { background:#dbeafe; color:#1d4ed8; }
.fsl { background:#e2e8f0; color:#334155; }
.fpu { background:#ede9fe; color:#6d28d9; }
</style>
{% endblock %}

{% block content %}
<div class="flora-page">

  <div class="tab-bar">
    <button class="tab-btn active" data-type="all"
            onclick="setTab(this)">All ({{ counts.all }})</button>
    <button class="tab-btn" data-type="single"
            onclick="setTab(this)">Single ({{ counts.single }})</button>
    <button class="tab-btn" data-type="multiple_match"
            onclick="setTab(this)">Multi-Match ({{ counts.multiple_match }})</button>
    <button class="tab-btn" data-type="multiple_original"
            onclick="setTab(this)">Multi-Orig ({{ counts.multiple_original }})</button>
  </div>

  <div class="status-bar">
    <button class="status-pill active" data-status="all"  onclick="setStatus(this)">All</button>
    <button class="status-pill" data-status="pending"     onclick="setStatus(this)">○ Pending</button>
    <button class="status-pill" data-status="in_progress" onclick="setStatus(this)">⏳ In Progress</button>
    <button class="status-pill" data-status="completed"   onclick="setStatus(this)">✓ Completed</button>
    <input type="text" id="search-box" placeholder="Search title or DOI…"
           oninput="debounceSearch()" style="flex:1;max-width:280px;font-size:11px">
    <span id="row-count" style="font-size:11px;color:#94a3b8;margin-left:auto"></span>
  </div>

  <div class="card" style="overflow:hidden">
    <table class="data-table" id="flora-table">
      <thead>
        <tr>
          <th style="width:150px">DOI (R)</th>
          <th>Replication Title</th>
          <th>Resolved Original</th>
          <th style="width:80px">Outcome</th>
          <th style="width:90px">Type</th>
          <th style="width:90px">Status</th>
          <th style="width:60px">Votes</th>
        </tr>
      </thead>
      <tbody id="flora-body">
        <tr><td colspan="7" style="padding:20px;text-align:center;color:#94a3b8">Loading…</td></tr>
      </tbody>
    </table>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
let currentType   = 'all';
let currentStatus = 'all';
let searchTimer   = null;
const openRows    = new Set();

const STATUS_META = {
  completed:   { label:'✓ Done',        cls:'fg' },
  in_progress: { label:'⏳ In Progress', cls:'fy' },
  pending:     { label:'○ Pending',      cls:'fsl' },
};
const TYPE_META = {
  single_original:   { label:'Single',      cls:'fb' },
  multiple_match:    { label:'Multi-Match',  cls:'fpu' },
  multiple_original: { label:'Multi-Orig',   cls:'fpu' },
};
const OUT_META = {
  success:      'fg', failure:'fr', mixed:'fy',
  uninformative:'fsl', descriptive:'fsl', pending:'fsl', api_error:'fr',
};

function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function trunc(s,n){ s=(s||''); return s.length>n?s.slice(0,n)+'…':s; }

async function loadTable() {
  const q = document.getElementById('search-box').value.trim();
  const url = `/api/flora/list?type=${currentType}&status=${currentStatus}&q=${encodeURIComponent(q)}`;
  const data = await fetch(url).then(r => r.json());
  const rows = data.rows;

  document.getElementById('row-count').textContent = `${rows.length} rows`;

  const tbody = document.getElementById('flora-body');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="padding:20px;text-align:center;color:#94a3b8">No results</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const sm  = STATUS_META[r.status_label] || STATUS_META.pending;
    const tm  = TYPE_META[r.match_type]     || TYPE_META.single_original;
    const oc  = OUT_META[r.outcome]         || 'fsl';
    const uid = CSS.escape(r.doi_r);
    return `
    <tr data-doi="${esc(r.doi_r)}" onclick="toggleDetail(this)" style="cursor:pointer">
      <td style="font-family:monospace;font-size:10px;color:#3b82f6">${trunc(r.doi_r,30)}</td>
      <td style="max-width:230px">${esc(trunc(r.title_r,65))}</td>
      <td style="max-width:200px;color:#64748b">${esc(trunc(r.title_o,55))}</td>
      <td><span class="fpp ${oc}">${esc(r.outcome||'—')}</span></td>
      <td><span class="fpp ${tm.cls}">${tm.label}</span></td>
      <td><span class="fpp ${sm.cls}">${sm.label}</span></td>
      <td style="font-size:11px;color:#64748b">${r.confirm_votes}✓ ${r.reject_votes}✗</td>
    </tr>
    <tr class="detail-row" style="display:none">
      <td colspan="7" class="detail-cell" data-doi="${esc(r.doi_r)}">Loading…</td>
    </tr>`;
  }).join('');
}

async function toggleDetail(tr) {
  const doi    = tr.dataset.doi;
  const detTr  = tr.nextElementSibling;
  const isOpen = detTr.style.display !== 'none';

  document.querySelectorAll('.detail-row').forEach(r => r.style.display = 'none');
  document.querySelectorAll('tr.expanded').forEach(r => r.classList.remove('expanded'));

  if (isOpen) return;

  detTr.style.display = '';
  tr.classList.add('expanded');

  const cell = detTr.querySelector('td');
  if (cell._loaded) return;
  cell._loaded = true;

  const d = await fetch('/api/flora/detail/' + encodeURIComponent(doi)).then(r => r.json());

  const voteHtml = !d.votes || d.votes.length === 0
    ? '<em style="color:#94a3b8">No votes yet</em>'
    : d.votes.map(v => {
        const vc = {confirm:'#16a34a',reject:'#dc2626',needs_review:'#f59e0b'}[v.vote]||'#64748b';
        return `<span style="margin-right:10px">
          <strong style="color:${vc}">${esc(v.reviewer)}</strong>: ${v.vote}
          ${v.comment?`<em style="color:#94a3b8"> — ${esc(v.comment)}</em>`:''}
        </span>`;
      }).join('');

  cell.innerHTML = `
    <div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:8px">
      <div>
        <span class="section-title">Replication DOI</span><br>
        <a href="https://doi.org/${esc(d.doi_r)}" target="_blank"
           style="color:#2563eb;font-family:monospace;font-size:11px">${esc(d.doi_r)}</a>
      </div>
      <div>
        <span class="section-title">Original DOI</span><br>
        <a href="https://doi.org/${esc(d.doi_o)}" target="_blank"
           style="color:#2563eb;font-family:monospace;font-size:11px">${esc(d.doi_o)||'—'}</a>
      </div>
      <div>
        <span class="section-title">Link Method</span><br>
        <span class="fpp ${({llm_fulltext:'fb',llm_abstract:'fb',author_year_match:'fg',target_pending:'fsl',api_error:'fr'}[d.link_method]||'fsl')}">${esc(d.link_method||'—')}</span>
      </div>
      <div>
        <span class="section-title">Outcome</span><br>
        <span class="fpp ${OUT_META[d.outcome]||'fsl'}">${esc(d.outcome||'—')}</span>
      </div>
      <div>
        <a href="/extract?doi=${encodeURIComponent(d.doi_r)}" target="_blank"
           style="color:#2563eb;font-size:11px">View in Extract tab ↗</a>
      </div>
    </div>
    ${d.link_evidence?`<div style="font-size:11px;font-style:italic;color:#475569;
       background:#fffbeb;border-left:3px solid #fcd34d;padding:5px 8px;
       border-radius:0 4px 4px 0;margin-bottom:8px">"${esc(d.link_evidence)}"</div>`:''}
    <div>
      <span class="section-title">Vote breakdown</span><br>
      <div style="margin-top:4px">${voteHtml}</div>
    </div>`;
}

function setTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = btn.dataset.type;
  loadTable();
}

function setStatus(btn) {
  document.querySelectorAll('.status-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentStatus = btn.dataset.status;
  loadTable();
}

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadTable, 250);
}

window.addEventListener('DOMContentLoaded', loadTable);
</script>
{% endblock %}
