{% extends "base.html" %}
{% block title %}FLoRA — Pipeline{% endblock %}

{% block head %}
<style>
.pip-page { max-width:1280px; margin:0 auto; padding:12px 16px; }
.pip-toolbar { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.pip-toolbar input { width:240px; padding:5px 10px; border:1px solid #e2e8f0;
  border-radius:6px; font-size:12px; }
.pip-toolbar select { padding:4px 8px; border:1px solid #e2e8f0;
  border-radius:6px; font-size:11px; background:#fff; width:auto; }
.pip-count { margin-left:auto; font-size:11px; color:#64748b; }

/* table */
.pip-table { width:100%; border-collapse:collapse; background:#fff;
  border:1px solid #e2e8f0; border-radius:8px; overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.05); font-size:12px; }
.pip-table thead th { background:#f8fafc; border-bottom:1px solid #e2e8f0;
  padding:7px 9px; text-align:left; font-size:9.5px; font-weight:700;
  text-transform:uppercase; letter-spacing:.05em; color:#64748b; }
.pip-table .dr { cursor:pointer; border-bottom:1px solid #f1f5f9; }
.pip-table .dr:hover td { background:#f8fafc; }
.pip-table .dr.exp td { background:#eff6ff; border-bottom:none; }
.pip-table td { padding:7px 9px; vertical-align:middle; }
.pip-table .det td { padding:0; background:#f0f9ff;
  border-bottom:1px solid #bae6fd; }
.tn { color:#94a3b8; font-size:11px; width:28px; text-align:right; }
.tdoi { font-family:monospace; font-size:10px; color:#2563eb;
  white-space:nowrap; max-width:190px; overflow:hidden; text-overflow:ellipsis; }
.ttl  { max-width:270px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tyr  { color:#64748b; width:46px; }
.tori { max-width:210px; overflow:hidden; text-overflow:ellipsis;
  white-space:nowrap; color:#475569; font-size:11px; }
.tarr { width:20px; color:#94a3b8; font-size:11px; }

/* pills */
.pp { display:inline-flex; align-items:center; padding:2px 7px;
  border-radius:10px; font-size:10px; font-weight:600; white-space:nowrap; }
.pg { background:#dcfce7; color:#166534; }
.pr { background:#fee2e2; color:#991b1b; }
.py { background:#fef3c7; color:#92400e; }
.pb { background:#dbeafe; color:#1d4ed8; }
.pp2{ background:#ede9fe; color:#6d28d9; }
.psl{ background:#e2e8f0; color:#334155; }
.pgr{ background:#f1f5f9; color:#475569; }
.po { background:#fff7ed; color:#9a3412; border:1px solid #fed7aa; }
.pdk{ background:#1e293b; color:#fff; }
.ptl{ background:#0369a1; color:#fff; }
.pdbg{ background:#059669; color:#fff; }
.pfl{ background:#1d4ed8; color:#fff; }
.pope{ background:#7c3aed; color:#fff; }
.ppdf{ background:#dc2626; color:#fff; }

/* detail panel */
.dp { padding:12px 14px 16px; }
.ph { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.ptit { font-size:10px; font-weight:700; color:#334155;
  text-transform:uppercase; letter-spacing:.08em; }
.pbts { display:flex; gap:5px; }
.bsm { padding:3px 9px; font-size:11px; font-weight:600; border-radius:5px;
  cursor:pointer; border:1px solid #cbd5e1; background:#fff; color:#475569; }
.bsm:hover { background:#f1f5f9; }

/* section cards */
.sc { background:#fff; border:1px solid #e2e8f0; border-radius:8px;
  padding:11px 13px; margin-bottom:8px; }
.sc.gbdr { border-color:#6ee7b7; }
.sc.dbdr { border-color:#6ee7b7; border-left:4px solid #059669; }
.sc.pbdr { border-color:#93c5fd; border-left:4px solid #2563eb; }
.sc.fbdr { border-color:#a5b4fc; }
.sc-hd { display:flex; align-items:center; gap:7px; margin-bottom:9px; flex-wrap:wrap; }
.sc-hd.sb { justify-content:space-between; }
.bdg { display:inline-flex; align-items:center; gap:4px; padding:2px 8px;
  border-radius:4px; font-size:10px; font-weight:700;
  text-transform:uppercase; letter-spacing:.05em; }
.mg4 { display:grid; grid-template-columns:repeat(4,1fr); gap:6px 14px; margin-bottom:9px; }
.mg2c { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
.ml { font-size:9px; font-weight:700; text-transform:uppercase;
  letter-spacing:.06em; color:#94a3b8; margin-bottom:2px; }
.mv { font-size:11px; color:#334155; }
.mv.mono { font-family:monospace; font-size:10px; color:#2563eb; }
.mv.bold { font-weight:700; font-size:13px; }
.qbox { background:#f8fafc; border-left:3px solid #93c5fd; padding:5px 9px;
  border-radius:0 4px 4px 0; font-size:11px; color:#475569;
  font-style:italic; margin-top:6px; }
.qbox.grn { border-left-color:#6ee7b7; }
.qbox.amb { border-left-color:#f59e0b; }
.ref-line { font-size:12px; color:#334155; line-height:1.5; margin-bottom:8px; }
a.dl { color:#2563eb; text-decoration:none; }
a.dl:hover { text-decoration:underline; }

/* candidates / refs table */
.ctbl,.reftbl { width:100%; font-size:11px; border-collapse:collapse; margin-top:6px; }
.ctbl th,.reftbl th { background:#f8fafc; padding:4px 8px; text-align:left;
  font-size:9px; font-weight:700; text-transform:uppercase; color:#64748b;
  border-bottom:1px solid #e2e8f0; }
.ctbl td,.reftbl td { padding:4px 8px; border-bottom:1px solid #f1f5f9; }
.ctbl tr.best td { background:#f0fdf4; }

/* PDF open button */
.pdf-btn { display:inline-flex; align-items:center; gap:5px; padding:5px 12px;
  background:#dc2626; color:#fff; border-radius:5px; font-size:11px;
  font-weight:700; text-decoration:none; cursor:pointer; border:none; }
.pdf-btn:hover { background:#b91c1c; }

/* collapsible */
.collap-hd { display:flex; align-items:center; gap:6px; cursor:pointer;
  padding:5px 0; font-size:11px; color:#334155; user-select:none; }
.collap-hd:hover { color:#1d4ed8; }
.collap-body { padding:6px 0 4px 16px; font-size:11px; color:#475569;
  line-height:1.6; display:none; }
.collap-body.open { display:block; }

/* column filter row */
.flt-row th { padding:3px 5px; background:#f1f5f9; border-bottom:2px solid #e2e8f0; }
.cf { width:100%; padding:3px 7px; border:1px solid #e2e8f0; border-radius:4px;
  font-size:10px; box-sizing:border-box; background:#fff; color:#334155; }
.cf:focus { border-color:#3b82f6; outline:none; }

/* full log */
.flog { display:none; background:#0f172a; border-radius:8px;
  padding:12px 14px; margin-top:8px; font-family:monospace;
  font-size:11px; color:#e2e8f0; line-height:1.7; }
.flog.open { display:block; }
.flog-sec { color:#38bdf8; font-weight:700; margin:8px 0 4px;
  font-size:10px; text-transform:uppercase; letter-spacing:.08em; }
.flog-row { display:grid; grid-template-columns:200px 1fr; gap:0 16px; }
.flog-key { color:#94a3b8; }
.flog-val { color:#e2e8f0; word-break:break-word; }
</style>
{% endblock %}

{% block content %}
<div class="pip-page">

  <div style="margin-bottom:6px;font-size:11px;color:#64748b" id="cnt"></div>

  <table class="pip-table">
    <thead>
      <tr>
        <th></th><th>#</th>
        <th>DOI (DOI_R)</th>
        <th>STUDY TITLE</th>
        <th>YEAR</th>
        <th>STATUS</th>
        <th>METHOD</th>
        <th>OUTCOME</th>
        <th>MATCHED ORIGINAL</th>
      </tr>
      <tr class="flt-row">
        <th></th><th></th>
        <th><input class="cf" type="text" data-col="doi_r" placeholder="DOI…"></th>
        <th><input class="cf" type="text" data-col="study_r" placeholder="Title…"></th>
        <th><input class="cf" type="text" data-col="year_r" placeholder="Year" style="width:52px"></th>
        <th>
          <select class="cf" data-col="status">
            <option value="">All</option>
            <option value="resolved">&#10003; Resolved</option>
            <option value="api_error">api_error</option>
            <option value="pending">pending</option>
          </select>
        </th>
        <th>
          <select class="cf" data-col="resolution_method">
            <option value="">All</option>
            <option value="llm_gemini">llm_gemini</option>
            <option value="llm_openai">llm_openai</option>
            <option value="grobid_ref_match">grobid_ref_match</option>
            <option value="same_author_year_title_overlap">same_author_year_title_overlap</option>
            <option value="single_candidate_after_requery">single_candidate_after_requery</option>
          </select>
        </th>
        <th>
          <select class="cf" data-col="outcome">
            <option value="">All</option>
            <option value="successful">successful</option>
            <option value="failed">failed</option>
            <option value="mixed">mixed</option>
            <option value="unclear">unclear</option>
          </select>
        </th>
        <th><input class="cf" type="text" data-col="resolved_title_o" placeholder="Title…"></th>
      </tr>
    </thead>
    <tbody id="pip-body">
      <tr><td colspan="9" style="padding:20px;text-align:center;color:#94a3b8">Loading…</td></tr>
    </tbody>
  </table>

</div>
{% endblock %}

{% block scripts %}
<script>
'use strict';
const detailCache = new Map();
let debTimer = null;
let allRows = [];

function esc(s) {
  return (s == null ? '' : String(s))
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadTable() {
  const data = await fetch('/api/pipeline/list').then(r => r.json());
  allRows = data.rows || [];
  renderFiltered();
}

function renderFiltered() {
  const filters = {};
  document.querySelectorAll('.cf').forEach(el => {
    const v = el.value.trim();
    if (v) filters[el.dataset.col] = v.toLowerCase();
  });

  const filtered = allRows.filter(r => {
    for (const [col, val] of Object.entries(filters)) {
      if (col === 'status') {
        if (val === 'resolved'  && !r.resolved) return false;
        if (val === 'pending'   && (r.resolved || r.match_status === 'api_error')) return false;
        if (val === 'api_error' && r.match_status !== 'api_error') return false;
      } else if (col === 'resolution_method' || col === 'outcome') {
        if (String(r[col] ?? '').toLowerCase() !== val) return false;
      } else {
        if (!String(r[col] ?? '').toLowerCase().includes(val)) return false;
      }
    }
    return true;
  });

  const cnt = document.getElementById('cnt');
  cnt.textContent = filtered.length === allRows.length
    ? `${allRows.length} rows · flora_all.csv`
    : `${filtered.length} of ${allRows.length} rows · flora_all.csv`;

  const tbody = document.getElementById('pip-body');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" style="padding:20px;text-align:center;color:#94a3b8">No results</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map((r, i) => rowHtml({...r, idx: i + 1})).join('');
}

function debounce() {
  clearTimeout(debTimer);
  debTimer = setTimeout(renderFiltered, 250);
}

function statusPill(r) {
  if (r.resolved) return '<span class="pp pg">&#10003; Resolved</span>';
  if (r.match_status === 'api_error') return '<span class="pp po">api_error</span>';
  return `<span class="pp pgr">${esc(r.match_status) || 'pending'}</span>`;
}

function outcomePill(v) {
  const map = { successful:'pg', failed:'pr', mixed:'py', unclear:'py' };
  const cls = map[v] || (v ? 'pgr' : 'pgr');
  return `<span class="pp ${cls}">${esc(v) || 'pending'}</span>`;
}

function rowHtml(r) {
  return `
    <tr class="dr" data-doi="${esc(r.doi_r)}" onclick="toggleRow(this)">
      <td class="tarr">&#9658;</td>
      <td class="tn">${r.idx}</td>
      <td class="tdoi" title="${esc(r.doi_r)}">${esc(r.doi_r)}</td>
      <td class="ttl" title="${esc(r.study_r)}">${esc(r.study_r)}</td>
      <td class="tyr">${esc(r.year_r)}</td>
      <td>${statusPill(r)}</td>
      <td><span class="pp psl">${esc(r.resolution_method) || '&mdash;'}</span></td>
      <td>${outcomePill(r.outcome)}</td>
      <td class="tori" title="${esc(r.resolved_title_o)}">${esc(r.resolved_title_o) || '&mdash;'}</td>
    </tr>
    <tr class="det" style="display:none">
      <td colspan="9"><div class="dp">Loading&hellip;</div></td>
    </tr>`;
}

async function toggleRow(tr) {
  const doi    = tr.dataset.doi;
  const detRow = tr.nextElementSibling;
  const dp     = detRow.querySelector('.dp');
  const isOpen = detRow.style.display !== 'none';

  document.querySelectorAll('.det').forEach(r => r.style.display = 'none');
  document.querySelectorAll('.dr.exp').forEach(r => {
    r.classList.remove('exp');
    r.querySelector('.tarr').innerHTML = '&#9658;';
  });

  if (isOpen) return;

  tr.classList.add('exp');
  tr.querySelector('.tarr').innerHTML = '&#9660;';
  detRow.style.display = '';

  if (detailCache.has(doi)) { dp.innerHTML = renderDetail(detailCache.get(doi)); return; }

  dp.innerHTML = '<div style="padding:20px;text-align:center;color:#94a3b8">Loading&hellip;</div>';
  const d = await fetch('/api/pipeline/detail?doi=' + encodeURIComponent(doi)).then(r => r.json());
  detailCache.set(doi, d);
  dp.innerHTML = renderDetail(d);
}

function collap(label, bodyHtml) {
  return `<div class="collap-hd" onclick="toggleCollap(this)" data-lbl="${esc(label)}">&#9658; ${esc(label)}</div>
    <div class="collap-body">${bodyHtml}</div>`;
}
function toggleCollap(hd) {
  const body = hd.nextElementSibling;
  const open = body.classList.toggle('open');
  hd.innerHTML = (open ? '&#9660; ' : '&#9658; ') + esc(hd.dataset.lbl);
}
function toggleFullLog(btn) {
  const flog = btn.closest('.dp').querySelector('.flog');
  const open = flog.classList.toggle('open');
  btn.textContent = open ? '✕ Full Log' : '☰ Full Log';
  if (open) flog.scrollIntoView({ behavior:'smooth', block:'nearest' });
}
async function copyDebug(btn) {
  const dp     = btn.closest('.dp');
  const detRow = dp.closest('tr');
  const doi    = detRow.previousElementSibling.dataset.doi;
  const d      = detailCache.get(doi);
  if (!d) return;
  await navigator.clipboard.writeText(JSON.stringify(d, null, 2));
  const orig = btn.textContent;
  btn.textContent = '✓ Copied';
  setTimeout(() => btn.textContent = orig, 1500);
}

function confPill(v) {
  if (!v) return '&mdash;';
  const cls = { high:'pg', medium:'py', low:'pr' }[v] || 'pgr';
  return `<span class="pp ${cls}">${esc(v)}</span>`;
}
function score(v) {
  const f = parseFloat(v);
  return isNaN(f) ? '&mdash;' : Math.round(f * 100) + '%';
}

function renderDetail(d) {
  // ── Section 1: INPUT ──────────────────────────────────────────────────────
  const s1 = `<div class="sc">
    <div class="sc-hd">
      <span class="bdg pdk">INPUT</span>
      <span class="pp pb">${esc(d.llm_study_type || d.type || 'Study')}</span>
    </div>
    <div class="mg4">
      <div style="grid-column:span 2"><div class="ml">DOI_R (Input)</div>
        <div class="mv mono">${esc(d.doi_r)}</div></div>
      <div><div class="ml">Match Source</div><div class="mv">${esc(d.match_source) || '&mdash;'}</div></div>
      <div><div class="ml">Match Status</div><div class="mv">${esc(d.match_status) || '&mdash;'}</div></div>
    </div>
    ${d.ref_r ? `<div class="ml" style="margin-bottom:3px">REF_R &mdash; Full Replication Citation</div>
      <div class="ref-line">${esc(d.ref_r)}</div>` : ''}
  </div>`;

  // ── Section 2: RESOLVED ───────────────────────────────────────────────────
  let s2 = '';
  if (d.resolved_doi_o) {
    s2 = `<div class="sc gbdr">
      <div class="sc-hd sb">
        <div style="display:flex;align-items:center;gap:7px">
          <span class="bdg pdbg">&#10003; RESOLVED</span>
          <span style="font-size:12px;font-weight:600;color:#334155">Resolved &mdash; Original Study</span>
        </div>
      </div>
      ${d.ref_o ? `<div class="ml" style="margin-bottom:3px">Reference (Resolved)</div>
        <div class="ref-line">${esc(d.ref_o)}</div>` : ''}
      <div class="mg4">
        <div><div class="ml">DOI (RESOLVED_DOI_O)</div>
          <div class="mv mono"><a href="https://doi.org/${esc(d.resolved_doi_o)}" target="_blank" class="dl">${esc(d.resolved_doi_o)}</a></div></div>
        <div style="grid-column:span 3"><div class="ml">Study (RESOLVED_TITLE_O)</div>
          <div class="mv bold">${esc(d.resolved_title_o)}</div></div>
        <div><div class="ml">Year</div><div class="mv">${esc(d.resolved_year_o) || '&mdash;'}</div></div>
        <div><div class="ml">First Author</div><div class="mv">${esc(d.resolved_author_o) || '&mdash;'}</div></div>
        <div><div class="ml">Resolution Method</div>
          <div class="mv"><span class="pp psl">${esc(d.resolution_method)}</span></div></div>
        <div><div class="ml">Confidence Score</div><div class="mv">${score(d.resolution_score)}</div></div>
        <div><div class="ml">LLM Source</div>
          <div class="mv"><span class="pp pgr">${esc(d.llm_source) || '&mdash;'}</span></div></div>
        <div><div class="ml">LLM Confidence</div><div class="mv">${confPill(d.llm_confidence)}</div></div>
      </div>
      ${d.llm_evidence ? `<div class="ml">LLM Evidence</div><div class="qbox">${esc(d.llm_evidence)}</div>` : ''}
      ${d.llm_reasoning ? `<div class="ml" style="margin-top:8px">LLM Reasoning</div>
        <div class="mv" style="margin-top:3px;line-height:1.5;color:#475569">${esc(d.llm_reasoning)}</div>` : ''}
    </div>`;
  }

  // ── Section 3: FLoRA panels ───────────────────────────────────────────────
  const hasFlora = d.flora_doi_o || d.flora_ref_o || d.flora_outcome || d.flora_ref_r;
  let s3 = '';
  if (hasFlora) {
    const prepNotes = d.flora_prep_notes || '';
    const prepShort = prepNotes.length > 300
      ? prepNotes.slice(0, 300) + `<span style="color:#3b82f6"> &hellip;(${prepNotes.length} chars)</span>`
      : prepNotes;
    s3 = `<div class="mg2c">
      <div class="sc fbdr">
        <div class="sc-hd"><span class="bdg pfl">FLORA</span>
          <span style="font-size:12px;font-weight:600;color:#334155">FLoRA &mdash; Original Study</span></div>
        ${d.flora_ref_o ? `<div class="ml">Reference (FLORA_REF_O)</div>
          <div class="ref-line">${esc(d.flora_ref_o)}</div>` : ''}
        <div class="mg4" style="grid-template-columns:1fr 1fr">
          <div><div class="ml">DOI (FLORA_DOI_O)</div>
            <div class="mv mono">${esc(d.flora_doi_o) || '&mdash;'}</div></div>
          <div><div class="ml">Study (FLORA_STUDY_O)</div>
            <div class="mv">${esc(d.flora_study_o) || '<span style="color:#94a3b8">&mdash;</span>'}</div></div>
          <div><div class="ml">Outcome</div><div class="mv">${esc(d.flora_outcome) || '&mdash;'}</div></div>
          <div><div class="ml">Quote Source</div>
            <div class="mv">${esc(d.flora_out_quote_source) || '&mdash;'}</div></div>
        </div>
        ${d.flora_outcome_quote ? `<div class="ml">Outcome Quote</div>
          <div class="qbox amb">${esc(d.flora_outcome_quote)}</div>` : ''}
      </div>
      <div class="sc fbdr">
        <div class="sc-hd"><span class="bdg pfl">FLORA</span>
          <span style="font-size:12px;font-weight:600;color:#334155">FLoRA &mdash; Replication Study</span></div>
        ${d.flora_ref_r ? `<div class="ml">Reference (FLORA_REF_R)</div>
          <div class="ref-line">${esc(d.flora_ref_r)}</div>` : ''}
        ${d.flora_url_r ? `<div class="ml">URL (FLORA_URL_R)</div>
          <div class="mv mono" style="margin-bottom:6px">
            <a href="${esc(d.flora_url_r)}" target="_blank" class="dl">${esc(d.flora_url_r)}</a></div>` : ''}
        ${prepNotes ? `<div class="ml">Prep Notes</div>
          <div class="mv" style="margin-top:3px;line-height:1.5;color:#475569;font-size:11px">${prepShort}</div>` : ''}
        ${d.flora_abstract_r ? `<div class="ml" style="margin-top:6px">Abstract (FLORA_ABSTRACT_R)</div>
          <div class="qbox" style="max-height:80px;overflow:hidden">
            ${esc(d.flora_abstract_r.slice(0, 400))}${d.flora_abstract_r.length > 400 ? '&hellip;' : ''}</div>` : ''}
      </div>
    </div>`;
  }

  // ── Section 4: OpenAlex candidates ───────────────────────────────────────
  let s4 = '';
  if (d.all_candidates_json && d.all_candidates_json.length > 0) {
    const cRows = d.all_candidates_json.map((c, i) => `
      <tr${i === 0 ? ' class="best"' : ''}>
        <td>${i + 1}</td>
        <td>${esc(c.title)}</td>
        <td>${esc(c.year)}</td>
        <td>${esc(c.first_author)}</td>
        <td style="font-family:monospace;font-size:10px">${c.doi
          ? `<a href="https://doi.org/${esc(c.doi)}" target="_blank" class="dl">${esc(c.doi)}</a>`
          : '&mdash;'}</td>
        <td>${c.match_year_exact ? '&#10003;' : '&plusmn;1yr'}</td>
      </tr>`).join('');
    s4 = `<div class="sc">
      <div class="sc-hd"><span class="bdg pope">OPENALEX</span>
        <span style="font-size:12px;font-weight:600;color:#334155">OpenAlex Re-query</span></div>
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:6px;margin-bottom:8px">
        <div><div class="ml">N_Candidates</div><div class="mv">${esc(d.n_candidates)}</div></div>
        <div><div class="ml">OpenAlex ID (Replication)</div>
          <div class="mv mono">${esc(d.openalex_id_r)}</div></div>
      </div>
      <div class="ml">All Candidates</div>
      <table class="ctbl">
        <thead><tr><th>#</th><th>Title</th><th>Year</th><th>First Author</th>
          <th>DOI</th><th>Year Exact?</th></tr></thead>
        <tbody>${cRows}</tbody>
      </table>
    </div>`;
  }

  // ── Section 5: PDF (two-column) ───────────────────────────────────────────
  const hasPdf = d.pdf_url || d.grobid_status;
  let s5 = '';
  if (hasPdf) {
    let refsHtml = '';
    if (d.grobid_refs_json && d.grobid_refs_json.length > 0) {
      const refs = d.grobid_refs_json.slice(0, 24);
      refsHtml = `<div class="ml" style="margin-top:6px">
        Reference List (first ${refs.length} of ${esc(d.n_grobid_refs)} entries)</div>
        <table class="reftbl">
          <thead><tr><th>#</th><th>Authors</th><th>Year</th><th>Title</th></tr></thead>
          <tbody>${refs.map((r, i) => `<tr>
            <td>${i + 1}</td>
            <td>${esc(Array.isArray(r.authors) ? r.authors.join(', ') : r.authors)}</td>
            <td>${esc(r.year)}</td>
            <td>${esc(r.title)}</td>
          </tr>`).join('')}</tbody>
        </table>`;
    }
    const tried = (d.pdf_url_tried || '').split(',').filter(Boolean);
    s5 = `<div class="mg2c">
      <div class="sc">
        <div class="sc-hd"><span class="bdg ppdf">PDF</span>
          <span style="font-size:12px;font-weight:600;color:#334155">PDF Acquisition</span></div>
        <div style="display:grid;grid-template-columns:1fr 2fr;gap:6px;margin-bottom:8px">
          <div><div class="ml">PDF_SOURCE</div>
            <div class="mv"><span class="pp pg">${esc(d.pdf_source) || '&mdash;'}</span></div></div>
          <div><div class="ml">PDF_URL</div>
            <div class="mv" style="font-size:10px;font-family:monospace;word-break:break-all">
              ${d.pdf_url ? `<a href="${esc(d.pdf_url)}" target="_blank" class="dl">${esc(d.pdf_url)}</a>` : '&mdash;'}</div></div>
        </div>
        ${d.pdf_serve_url ? `<a class="pdf-btn" href="${esc(d.pdf_serve_url)}" target="_blank">&#128196; Open PDF (cached)</a>` : ''}
        ${tried.length ? `<div class="ml" style="margin-top:8px">URLs Tried</div>
          <div style="font-size:10.5px;font-family:monospace;color:#475569;margin-top:2px">
            ${tried.map(u => `&bull; ${esc(u.trim())}`).join('<br>')}</div>` : ''}
      </div>
      <div class="sc">
        <div class="sc-hd"><span class="bdg ppdf">PDF</span>
          <span style="font-size:12px;font-weight:600;color:#334155">PDF Section Extraction</span></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
          <div><div class="ml">Extraction Status</div>
            <div class="mv"><span class="pp ${d.grobid_status === 'success' ? 'pg' : 'po'}">
              ${esc(d.grobid_status) || '&mdash;'}</span></div></div>
          <div><div class="ml">References Parsed</div>
            <div class="mv">${esc(d.n_grobid_refs) || '&mdash;'}</div></div>
        </div>
        ${d.grobid_abstract ? collap('Abstract (PDF extract)', `<div style="line-height:1.6">${esc(d.grobid_abstract)}</div>`) : ''}
        ${d.grobid_intro   ? collap('Introduction excerpt (PDF)', `<div style="line-height:1.6">${esc(d.grobid_intro)}</div>`) : ''}
        ${d.grobid_methods ? collap('Methods excerpt (PDF)', `<div style="line-height:1.6">${esc(d.grobid_methods)}</div>`) : ''}
        ${refsHtml}
      </div>
    </div>`;
  }

  // ── Section 6: LLM Debug ──────────────────────────────────────────────────
  let s6 = '';
  if (d.llm_prompt) {
    s6 = `<div class="sc dbdr">
      <div class="sc-hd sb">
        <div style="display:flex;align-items:center;gap:7px">
          <span class="bdg pdbg">DEBUG</span>
          <span style="font-size:12px;font-weight:600;color:#334155">LLM Input / Output</span>
        </div>
        <span style="font-size:10px;color:#64748b">
          sent to ${esc(d.llm_source)} &middot; ${d.llm_prompt.length} chars prompt</span>
      </div>
      ${collap('Full LLM prompt (click to expand)',
        `<pre style="white-space:pre-wrap;font-size:10px;overflow-x:auto">${esc(d.llm_prompt)}</pre>`)}
      ${collap('LLM output fields',
        `<div style="display:grid;grid-template-columns:150px 1fr;gap:3px 12px;font-family:monospace;font-size:11px">
          <span style="color:#94a3b8">llm_source</span><span>${esc(d.llm_source)}</span>
          <span style="color:#94a3b8">llm_confidence</span><span>${esc(d.llm_confidence)}</span>
          ${d.llm_evidence ? `<span style="color:#94a3b8">evidence</span><span>${esc(d.llm_evidence)}</span>` : ''}
          ${d.llm_reasoning ? `<span style="color:#94a3b8">reasoning</span><span>${esc(d.llm_reasoning)}</span>` : ''}
          ${d.llm_error ? `<span style="color:#94a3b8">error</span>
            <span style="color:#dc2626">${esc(d.llm_error)}</span>` : ''}
        </div>`)}
    </div>`;
  }

  // ── Section 7: Pipeline pass-through ─────────────────────────────────────
  const ptFields = [
    ['LLM_STUDY_TYPE',              d.llm_study_type],
    ['LLM_ORIGINAL_CITATION',       d.llm_original_citation],
    ['LLM_ORIGINAL_SEARCH',         d.llm_original_search],
    ['OUTCOME_CONFIDENCE',          d.outcome_confidence],
    ['OUTCOME_ORIGINAL_CONFIRMED',  d.outcome_original_confirmed],
    ['OUTCOME_ORIGINAL_STUDY',      d.outcome_original_study],
    ['QUOTE_VALIDATED',             d.quote_validated],
    ['QUOTE_SIMILARITY',            d.quote_similarity],
    ['PATHWAY_SOURCE',              d.pathway_source],
    ['ABSTRACT_SOURCE',             d.abstract_source],
    ['AUTHOR_YEAR_PATTERN_R',       d.author_year_pattern_r],
    ['MULTI_TARGET',                d.multi_target],
    ['FRED_MATCH_TYPE',             d.fred_match_type],
    ['READINESS_LEVEL',             d.readiness_level],
  ].filter(([, v]) => v);

  const ptCells = ptFields.map(([k, v]) =>
    `<div><div class="ml">${k}</div><div class="mv">${esc(v)}</div></div>`).join('');
  const reasonRow = d.outcome_reasoning
    ? `<div style="grid-column:span 3"><div class="ml">OUTCOME_REASONING</div>
        <div class="mv" style="color:#475569">${esc(d.outcome_reasoning)}</div></div>` : '';

  const s7 = `<div class="sc pbdr">
    <div class="sc-hd"><span class="bdg ptl">PIPELINE</span>
      <span style="font-size:12px;font-weight:600;color:#334155">Pipeline Pass-through (from flora_all.csv)</span></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px 16px;font-size:11px">
      ${ptCells}${reasonRow}
    </div>
    ${d.outcome_quote ? `<div class="ml" style="margin-top:8px">Outcome Quote</div>
      <div class="qbox grn">${esc(d.outcome_quote)}</div>` : ''}
  </div>`;

  // ── Full Log (hidden) ─────────────────────────────────────────────────────
  function flogSec(title, keys) {
    const rows = keys
      .filter(k => d[k] !== undefined && d[k] !== '' && !Array.isArray(d[k]))
      .map(k => {
        let v = String(d[k]);
        const orig = v;
        if (v.length > 200) v = v.slice(0, 200) + ` &hellip;(${orig.length} chars)`;
        return `<div class="flog-row"><span class="flog-key">${esc(k)}</span>
          <span class="flog-val">${esc(v)}</span></div>`;
      }).join('');
    return rows ? `<div class="flog-sec">${esc(title)}</div>${rows}` : '';
  }

  const floraKeys   = Object.keys(d).filter(k => k.startsWith('flora_'));
  const stage1bKeys = ['study_r','abstract_r','year_r','authors_r','journal_r',
    'author_year_pattern_r','openalex_id_r','match_source','match_status',
    'doi_o','ref_o','ref_r','url_r','llm_study_type','llm_original_citation',
    'llm_original_search','llm_n_original_studies','llm_uses_new_data',
    'multi_target','fred_match_type','readiness_level','tier',
    'pathway_source','abstract_source'];
  const pdfKeys     = ['pdf_source','pdf_url','pdf_path','pdf_ok','pdf_url_tried',
    'grobid_status','n_grobid_refs'];
  const llmKeys     = ['resolution_method','resolution_score','resolved_doi_o',
    'resolved_title_o','resolved_year_o','resolved_author_o','llm_source',
    'llm_confidence','llm_evidence','llm_reasoning','llm_error'];
  const outcKeys    = ['outcome','outcome_quote','out_quote_source','outcome_confidence',
    'outcome_original_confirmed','outcome_original_study','outcome_reasoning',
    'quote_validated','quote_similarity'];
  const valKeys     = ['validation_status','user_val_status','user_val_comment',
    'flora_validation_status','flora_validator','flora_validator_notes'];

  const flog = `<div class="flog">
    ${flogSec('Stage 1 · FLoRA Sheet', floraKeys)}
    ${flogSec('Stage 1B · OpenAlex Candidates (Pass-through)', stage1bKeys)}
    ${flogSec('Stage 2 · PDF & GROBID', pdfKeys)}
    ${flogSec('Stage 3 · LLM Resolution', llmKeys)}
    ${flogSec('Stage 4 · Outcome', outcKeys)}
    ${flogSec('Stage 5 · Validation', valKeys)}
  </div>`;

  // ── Header ────────────────────────────────────────────────────────────────
  const header = `<div class="ph">
    <span class="ptit">Pipeline Result</span>
    <div class="pbts">
      <button class="bsm" onclick="toggleFullLog(this)">&#9776; Full Log</button>
      <button class="bsm" onclick="copyDebug(this)">&#10696; Copy Debug</button>
    </div>
  </div>`;

  return header + s1 + s2 + s3 + s4 + s5 + s6 + s7 + flog;
}

window.addEventListener('DOMContentLoaded', () => {
  loadTable();
  document.querySelectorAll('.cf').forEach(el => {
    const isSel = el.tagName === 'SELECT';
    el.addEventListener(isSel ? 'change' : 'input', isSel ? renderFiltered : debounce);
  });
});
</script>
{% endblock %}
