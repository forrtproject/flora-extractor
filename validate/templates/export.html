{% extends "base.html" %}
{% block title %}FLoRA — Export{% endblock %}

{% block content %}
<div style="max-width:520px;margin:40px auto;padding:0 16px">
  <h1 style="font-size:16px;font-weight:700;margin-bottom:4px">Export Validated Records</h1>
  <p style="color:#64748b;font-size:12px;margin-bottom:24px">
    Downloads confirmed records from the validation database.
  </p>

  <div class="card" style="padding:24px">
    <div style="margin-bottom:16px">
      <div class="section-title" style="margin-bottom:8px">Format</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer">
          <input type="radio" name="fmt" value="csv" checked style="width:auto;margin-top:2px">
          <div>
            <div style="font-weight:600;font-size:12px">CSV</div>
            <div style="font-size:11px;color:#64748b">All columns, UTF-8 with BOM</div>
          </div>
        </label>
        <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer">
          <input type="radio" name="fmt" value="xlsx" style="width:auto;margin-top:2px">
          <div>
            <div style="font-weight:600;font-size:12px">Excel (.xlsx)</div>
            <div style="font-size:11px;color:#64748b">All columns, formatted spreadsheet</div>
          </div>
        </label>
        <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer">
          <input type="radio" name="fmt" value="minimal" style="width:auto;margin-top:2px">
          <div>
            <div style="font-weight:600;font-size:12px">Minimal CSV</div>
            <div style="font-size:11px;color:#64748b">5 columns: doi_r, title_r, doi_o, title_o, validation_status</div>
          </div>
        </label>
      </div>
    </div>

    <div style="margin-bottom:20px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px">
        <input type="checkbox" id="include-needs-review" style="width:auto">
        Also include <em>needs_review</em> rows
      </label>
    </div>

    <button class="btn btn-primary" onclick="doExport()"
            style="justify-content:center;width:100%;padding:10px;font-size:13px">
      Download →
    </button>
    <div id="export-msg" style="font-size:11px;color:#64748b;margin-top:8px;text-align:center"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function doExport() {
  const fmt = document.querySelector('input[name=fmt]:checked').value;
  const inc = document.getElementById('include-needs-review').checked;
  document.getElementById('export-msg').textContent = 'Preparing download…';

  const resp = await fetch('/api/export/download', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({format: fmt, include_needs_review: inc}),
  });

  if (!resp.ok) {
    document.getElementById('export-msg').textContent = 'Error: ' + resp.statusText;
    return;
  }

  const blob = await resp.blob();
  const cd   = resp.headers.get('Content-Disposition') || '';
  const name = (cd.match(/filename="?([^"]+)"?/) || [])[1] || 'validated.csv';
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
  document.getElementById('export-msg').textContent = 'Downloaded ' + name;
}
</script>
{% endblock %}
