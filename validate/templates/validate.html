{% extends "base.html" %}
{% block title %}FLoRA — Validate{% endblock %}

{% block head %}
<style>
#vwrap   { max-width:1100px; margin:16px auto; padding:0 14px; }

/* top bar */
.vtop    { display:flex; align-items:center; gap:8px; flex-wrap:wrap;
           margin-bottom:8px; font-size:12px; color:#64748b; }
.vtop select { font-size:11px; padding:3px 8px; border:1px solid #e2e8f0;
               border-radius:4px; }
.nav-btn { padding:4px 10px; font-size:11px; font-weight:600;
           border:1px solid #e2e8f0; border-radius:5px; background:#fff;
           cursor:pointer; color:#334155; }
.nav-btn:hover { background:#f1f5f9; }

/* progress bar */
.vprog { height:4px; background:#e2e8f0; border-radius:2px; margin-bottom:10px; }
.vprog-fill { height:4px; background:#2563eb; border-radius:2px; transition:width .3s; }

/* card */
.vcard { background:#fff; border:1px solid #e2e8f0; border-radius:10px;
         box-shadow:0 1px 4px rgba(0,0,0,.06); overflow:hidden; }
.vstatus-bar { display:flex; align-items:center; gap:10px; padding:8px 14px;
               background:#f8fafc; border-bottom:1px solid #e2e8f0;
               font-size:11px; color:#64748b; }

/* two-panel body */
.vbody  { display:flex; min-height:360px; }
.vpanel-l { flex:1.3; padding:16px 18px; border-right:1px solid #e2e8f0;
             min-width:0; overflow:hidden; }
.vpanel-r { flex:1; padding:14px 16px; display:flex; flex-direction:column;
             gap:10px; min-width:260px; max-width:360px; }

/* section headings */
.vsec-hd { font-size:9px; font-weight:800; text-transform:uppercase;
           letter-spacing:.08em; color:#94a3b8; margin-bottom:4px; }
.vsec-title { font-size:14px; font-weight:700; color:#1e293b; line-height:1.4;
              margin-bottom:4px; }
.vsec-doi { font-size:10px; font-family:monospace; color:#2563eb;
            text-decoration:none; display:inline-block; margin-bottom:8px; }
.vsec-doi:hover { text-decoration:underline; }
.vabs  { font-size:11px; color:#475569; line-height:1.6;
         background:#f8fafc; padding:8px 10px; border-radius:6px;
         border:1px solid #e2e8f0; max-height:140px; overflow-y:auto; margin-top:4px; }

/* divider */
.vdiv { border:none; border-top:1px solid #e2e8f0; margin:12px 0; }

/* original study block */
.vorig-resolved { background:#f0fdf4; border:1px solid #6ee7b7;
                  border-radius:6px; padding:10px 12px; margin-bottom:8px; }
.vorig-pending  { background:#f8fafc; border:1px solid #cbd5e1;
                  border-radius:6px; padding:10px 12px; margin-bottom:8px;
                  color:#94a3b8; font-size:11px; }
.vorig-title { font-size:13px; font-weight:700; color:#1d4ed8; line-height:1.4;
               margin-bottom:4px; }
.vorig-doi { font-size:10px; font-family:monospace; color:#2563eb; text-decoration:none; }
.vorig-doi:hover { text-decoration:underline; }
.vorig-meta { font-size:11px; color:#475569; margin-top:4px; }
.vorig-xref { font-size:11px; color:#64748b; margin-top:6px;
              padding-top:6px; border-top:1px dashed #e2e8f0; line-height:1.5; }

/* link pills */
.vpp { display:inline-flex; align-items:center; padding:2px 8px;
       border-radius:10px; font-size:10px; font-weight:600; white-space:nowrap; }
.pll { background:#dbeafe; color:#1d4ed8; }
.plg { background:#dcfce7; color:#166534; }
.plr { background:#fee2e2; color:#991b1b; }
.ply { background:#fef3c7; color:#92400e; }
.plp { background:#e2e8f0; color:#334155; }

/* evidence quote */
.vevid { background:#fffbeb; border-left:3px solid #fcd34d; padding:6px 10px;
         font-size:11px; font-style:italic; color:#475569;
         border-radius:0 4px 4px 0; line-height:1.6; margin-bottom:8px; }

/* outcome */
.vout-block { background:#f0fdf4; border-radius:6px; border:1px solid #bbf7d0;
              padding:8px 10px; margin-bottom:6px; }
.vout-val { font-weight:700; font-size:13px; }

/* voting panel */
.vote-btn { width:100%; padding:8px 12px; font-size:12px; font-weight:600;
            border-radius:7px; cursor:pointer; text-align:left;
            border-width:2px; border-style:solid; transition:all .15s; }
.vote-btn:hover { filter:brightness(.95); }
.vote-btn.selected { box-shadow:0 0 0 3px rgba(0,0,0,.15); }
.btn-confirm { background:#dcfce7; color:#166534; border-color:#86efac; }
.btn-reject  { background:#fee2e2; color:#991b1b; border-color:#fca5a5; }
.btn-review  { background:#fef3c7; color:#92400e; border-color:#fcd34d; }
.vsubmit { background:#1d4ed8; color:#fff; border:none; border-radius:7px;
           padding:9px; font-size:12px; font-weight:600; cursor:pointer;
           width:100%; text-align:center; }
.vsubmit:hover { background:#1e40af; }
.vinp { width:100%; font-size:11px; padding:5px 7px; border:1px solid #e2e8f0;
        border-radius:5px; box-sizing:border-box; }
.vtxt { width:100%; font-size:11px; padding:5px 7px; border:1px solid #e2e8f0;
        border-radius:5px; box-sizing:border-box; resize:vertical; }
.other-votes { font-size:11px; color:#475569; padding-top:6px;
               border-top:1px solid #e2e8f0; }

/* full-log section */
.vlog-bar { border-top:1px solid #e2e8f0; padding:8px 16px; background:#f8fafc; }
.vlog-toggle { font-size:11px; color:#3b82f6; background:none; border:none;
               cursor:pointer; display:inline-flex; align-items:center; gap:5px;
               font-weight:600; }
.vlog-ext { font-size:11px; color:#94a3b8; font-weight:400;
            text-decoration:none; margin-left:12px; }
.vlog-ext:hover { color:#2563eb; }
.vlog-body { padding:0 0 14px 0; display:none; }

.spinner { display:inline-block; width:12px; height:12px; border:2px solid #e2e8f0;
           border-top-color:#2563eb; border-radius:50%;
           animation:spin .6s linear infinite; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty-state { text-align:center; padding:60px 20px; color:#94a3b8; }
</style>
{% endblock %}

{% block content %}
<div id="vwrap">
  <div class="vtop">
    <span id="vprog-text" style="color:#64748b"></span>
    <select id="queue-mode" onchange="loadCard()">
      <option value="pending">Pending first</option>
      <option value="all">All papers</option>
    </select>
    <button class="nav-btn" onclick="prevCard()">← Prev</button>
    <button class="nav-btn" onclick="nextCard()">Next →</button>
  </div>
  <div class="vprog"><div class="vprog-fill" id="vprog-fill" style="width:0%"></div></div>
  <div id="vcard" class="vcard">
    <div class="empty-state"><span class="spinner"></span> Loading…</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentId    = null;
let currentDoi   = null;
let currentRank  = 1;
let selectedVote = null;
let logLoaded    = false;

function esc(s){
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function trunc(s,n){ s=(s||''); return s.length>n?s.slice(0,n)+'…':s; }

function vpp(v, cls){ return `<span class="vpp ${cls}">${esc(v||'—')}</span>`; }
function pillOutcome(v){
  const m={success:'plg',failure:'plr',mixed:'ply',uninformative:'plp',
           descriptive:'plp',pending:'plp',api_error:'plr'};
  return vpp(v, m[v]||'plp');
}
function pillMethod(v){
  const m={llm_fulltext:'pll',llm_abstract:'pll',author_year_match:'plg',
           target_pending:'plp',api_error:'plr'};
  return vpp(v, m[v]||'plp');
}
function pillConf(v){ return vpp(v, {high:'plg',medium:'ply',low:'plr'}[v]||'plp'); }

async function loadCard(afterId, beforeId) {
  const mode = document.getElementById('queue-mode').value;
  let url = '/api/review/next?show_all=' + (mode==='all'?'true':'false');
  if (afterId)  url += '&after_id='  + afterId;
  if (beforeId) url += '&before_id=' + beforeId;

  document.getElementById('vcard').innerHTML =
    '<div class="empty-state"><span class="spinner"></span> Loading…</div>';

  const data = await fetch(url).then(r=>r.json());
  if (data.done) {
    document.getElementById('vcard').innerHTML =
      '<div class="empty-state"><strong>All done!</strong><br>' +
      '<span style="font-size:12px">No more papers in this queue.</span></div>';
    document.getElementById('vprog-text').textContent = '';
    return;
  }

  currentId    = data.id;
  currentDoi   = data.doi_r;
  currentRank  = data.original_rank || 1;
  selectedVote = data.your_vote;
  logLoaded    = false;

  const done = data.total - data.total_pending;
  const pct  = data.total > 0 ? Math.round(done/data.total*100) : 0;
  document.getElementById('vprog-fill').style.width = pct + '%';
  document.getElementById('vprog-text').textContent =
    `${done} / ${data.total} reviewed`;

  const stColors = { confirmed:'#16a34a', rejected:'#dc2626',
                     needs_review:'#f59e0b', pending:'#64748b' };
  const stColor = stColors[data.validation_status] || '#64748b';

  const linkResolved = data.doi_o &&
    data.link_method !== 'target_pending' &&
    data.link_method !== 'api_error';

  const metaLine = [data.year_o, trunc(data.authors_o||'',60)].filter(Boolean).join(' · ');

  const selConf = {confirm:'btn-confirm',reject:'btn-reject',needs_review:'btn-review'};

  document.getElementById('vcard').innerHTML = `
    <div class="vstatus-bar">
      <span style="font-weight:700;color:${stColor}">${esc((data.validation_status||'pending').replace(/_/g,' '))}</span>
      <span style="font-family:monospace;font-size:10px;color:#94a3b8">${esc(data.doi_r)}</span>
      <span style="margin-left:auto;display:flex;gap:4px">
        ${pillMethod(data.link_method)} ${pillConf(data.link_confidence)}
      </span>
    </div>

    <div class="vbody">
      <!-- LEFT PANEL -->
      <div class="vpanel-l">
        <div class="vsec-hd">Replication Study</div>
        <div class="vsec-title">${esc(data.title_r || '(no title)')}</div>
        <a class="vsec-doi" href="https://doi.org/${esc(data.doi_r)}" target="_blank">
          ${esc(data.doi_r)} ↗
        </a>

        ${data.abstract_r ? `
        <details>
          <summary style="font-size:11px;font-weight:600;color:#334155;cursor:pointer;user-select:none">
            Abstract
          </summary>
          <div class="vabs">${esc(data.abstract_r)}</div>
        </details>` : ''}

        <hr class="vdiv">

        <div class="vsec-hd">Resolved Original Study</div>

        ${linkResolved ? `
        <div class="vorig-resolved">
          <div class="vorig-title" id="orig-title">${esc(data.title_o)}</div>
          <a class="vorig-doi" href="https://doi.org/${esc(data.doi_o)}" target="_blank">
            ${esc(data.doi_o)} ↗
          </a>
          <div class="vorig-meta" id="orig-meta">${esc(metaLine)}</div>
          <div class="vorig-xref" id="orig-xref">
            <span class="spinner"></span> Fetching citation…
          </div>
        </div>` : `
        <div class="vorig-pending">
          ${data.link_method === 'api_error'
            ? '⚠ Extraction failed (api_error)'
            : 'Original study not yet resolved'}
        </div>`}

        ${data.link_evidence ? `
        <div class="vsec-hd">Link Evidence</div>
        <div class="vevid">"${esc(data.link_evidence)}"</div>` : ''}

        ${data.outcome && data.outcome !== 'pending' ? `
        <div class="vsec-hd">Outcome</div>
        <div class="vout-block">
          ${pillOutcome(data.outcome)} ${pillConf(data.outcome_confidence)}
          ${data.outcome_phrase ? `<div style="font-size:11px;color:#475569;margin-top:5px;font-style:italic">
            "${esc(trunc(data.outcome_phrase,220))}"</div>` : ''}
        </div>` : ''}
      </div>

      <!-- RIGHT PANEL -->
      <div class="vpanel-r">
        <div class="vsec-hd">Your Vote</div>
        <button class="vote-btn btn-confirm${selectedVote==='confirm'?' selected':''}"
                onclick="selectVote('confirm')">✓ &nbsp;Confirm</button>
        <button class="vote-btn btn-reject${selectedVote==='reject'?' selected':''}"
                onclick="selectVote('reject')">✗ &nbsp;Reject</button>
        <button class="vote-btn btn-review${selectedVote==='needs_review'?' selected':''}"
                onclick="selectVote('needs_review')">? &nbsp;Needs Review</button>

        <div>
          <div class="vsec-hd" style="margin-bottom:3px">Correct Original DOI</div>
          <input class="vinp" type="text" id="vote-doi"
                 placeholder="10.xxxx/… if wrong"
                 style="font-family:monospace;font-size:10px">
        </div>

        <div>
          <div class="vsec-hd" style="margin-bottom:3px">Comment</div>
          <textarea class="vtxt" id="vote-comment" rows="3"
                    placeholder="Optional note…">${esc(data.your_comment||'')}</textarea>
        </div>

        <button class="vsubmit" onclick="submitVote()">Submit →</button>

        ${data.vote_count > 0 ? `
        <div class="other-votes">
          <div class="vsec-hd" style="margin-bottom:4px">Other Votes</div>
          <span class="vpp plg">${data.confirm_votes}✓</span>&nbsp;
          <span class="vpp plr">${data.reject_votes}✗</span>&nbsp;
          <span style="color:#94a3b8;font-size:10px">${data.vote_count} vote(s)</span>
        </div>` : ''}
      </div>
    </div>

    <div class="vlog-bar">
      <button class="vlog-toggle" onclick="toggleLog()">
        <span id="vlog-arr">▸</span>
        Full Extraction Log
      </button>
      <a class="vlog-ext"
         href="/extract?doi=${encodeURIComponent(data.doi_r)}" target="_blank">
        Open in Extract tab ↗
      </a>
      <div class="vlog-body" id="vlog-body"></div>
    </div>
  `;

  if (linkResolved && data.doi_o) fetchCrossref(data.doi_o);
}

async function fetchCrossref(doi) {
  const el = document.getElementById('orig-xref');
  if (!el) return;
  try {
    const d = await fetch('/api/crossref/lookup?doi=' + encodeURIComponent(doi)).then(r=>r.json());
    if (d.error) { el.textContent = ''; return; }
    const journal = [d.journal, d.volume ? `Vol.${d.volume}` : '', d.pages].filter(Boolean).join(', ');
    el.innerHTML = `<strong>${esc(d.title||'')}</strong><br>
      ${esc(d.authors)} ${d.year?`(${d.year})`:''}${journal?` · ${esc(journal)}`:''}`;
    const titleEl = document.getElementById('orig-title');
    const metaEl  = document.getElementById('orig-meta');
    if (titleEl && d.title && !titleEl.textContent.trim()) titleEl.textContent = d.title;
    if (metaEl  && d.authors) metaEl.textContent = [d.year, trunc(d.authors,70)].filter(Boolean).join(' · ');
  } catch(e) {
    if (el) el.textContent = '';
  }
}

async function toggleLog() {
  const body  = document.getElementById('vlog-body');
  const arrow = document.getElementById('vlog-arr');
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  arrow.textContent  = open ? '▸' : '▾';
  if (!open && !logLoaded) {
    logLoaded = true;
    body.innerHTML = '<span class="spinner"></span> Loading…';
    try {
      const d = await fetch(
        `/api/extract/detail?doi=${encodeURIComponent(currentDoi)}&rank=${encodeURIComponent(currentRank)}`
      ).then(r=>r.json());
      if (d.error) { body.innerHTML = `<span style="color:#ef4444">${esc(d.error)}</span>`; return; }
      body.innerHTML = buildLogHtml(d);
    } catch(e) {
      body.innerHTML = `<span style="color:#ef4444">${esc(String(e))}</span>`;
    }
  }
}

function buildLogHtml(d) {
  const row = (lbl,val) => val ? `<tr>
    <td style="font-size:9px;font-weight:700;text-transform:uppercase;color:#94a3b8;
               padding:3px 10px 3px 0;white-space:nowrap">${lbl}</td>
    <td style="font-size:11px;padding:3px 0">${esc(val)}</td></tr>` : '';

  let html = `<div style="padding-top:10px;border-top:1px solid #e2e8f0;margin-top:8px">`;

  html += `<table style="border-collapse:collapse;margin-bottom:10px">
    ${row('Filter Status', d.filter_status)}
    ${row('Filter Method', d.filter_method)}
    ${row('Match Type', d.original_match_type)}
    ${row('Link Method', d.link_method)}
    ${row('Link Confidence', d.link_confidence)}
    ${row('Outcome', d.outcome)}
    ${row('Outcome Confidence', d.outcome_confidence)}
    ${row('Quote Source', d.out_quote_source)}
  </table>`;

  if (d.link_evidence) html += `
    <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:3px">Link Evidence</div>
    <div style="background:#fffbeb;border-left:3px solid #fcd34d;padding:6px 10px;
                font-size:11px;font-style:italic;color:#475569;border-radius:0 4px 4px 0;margin-bottom:10px">
      "${esc(d.link_evidence)}"</div>`;

  if (d.llm_reasoning) html += `
    <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:3px">LLM Reasoning</div>
    <div style="font-size:11px;color:#475569;line-height:1.5;margin-bottom:10px">${esc(d.llm_reasoning)}</div>`;

  if (d.oa_candidates && d.oa_candidates.length > 0) {
    const rows = d.oa_candidates.map((c,i) => {
      const hit = d.doi_o && c.doi && c.doi.toLowerCase()===d.doi_o.toLowerCase();
      return `<tr style="${hit?'background:#dcfce7;font-weight:600':''}">
        <td style="padding:3px 6px">${i+1}</td>
        <td style="padding:3px 6px">${esc(c.title||c.study_o||'')}</td>
        <td style="padding:3px 6px">${esc(c.year||'')}</td>
        <td style="padding:3px 6px;font-family:monospace;font-size:9px;color:#2563eb">${esc(c.doi||'')}</td>
      </tr>`;
    }).join('');
    html += `
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:4px">
        OpenAlex Candidates (${d.oa_candidates.length})</div>
      <table style="width:100%;border-collapse:collapse;margin-bottom:10px;font-size:11px">
        <thead><tr style="background:#f8fafc">
          <th style="padding:3px 6px;font-size:9px;color:#64748b;text-align:left">#</th>
          <th style="padding:3px 6px;font-size:9px;color:#64748b;text-align:left">Title</th>
          <th style="padding:3px 6px;font-size:9px;color:#64748b;text-align:left">Year</th>
          <th style="padding:3px 6px;font-size:9px;color:#64748b;text-align:left">DOI</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  if (d.llm_prompt) html += `
    <div style="font-size:9px;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:3px">
      LLM Prompt (DOI Resolution)</div>
    <pre style="background:#0f172a;border-radius:6px;padding:10px 14px;font-size:11px;
                color:#cbd5e1;line-height:1.6;white-space:pre-wrap;overflow-x:auto;
                max-height:320px;overflow-y:auto;margin-bottom:10px">${esc(d.llm_prompt)}</pre>`;

  html += `</div>`;
  return html;
}

function selectVote(v) {
  selectedVote = v;
  document.querySelectorAll('.vote-btn').forEach(b => b.classList.remove('selected'));
  const map = {confirm:'btn-confirm', reject:'btn-reject', needs_review:'btn-review'};
  const btn = document.querySelector('.' + (map[v]||''));
  if (btn) btn.classList.add('selected');
}

async function submitVote() {
  if (!selectedVote) { alert('Select a vote first.'); return; }
  const body = {
    replication_id:  currentId,
    vote:            selectedVote,
    comment:         document.getElementById('vote-comment').value,
    corrected_doi_o: document.getElementById('vote-doi').value,
  };
  const resp = await fetch('/vote', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  if (!resp.ok) { alert('Error saving vote.'); return; }
  const mode = document.getElementById('queue-mode').value;
  if (mode==='all') loadCard(currentId); else loadCard();
}

function nextCard() { if (currentId) loadCard(currentId); }
function prevCard() { if (currentId) loadCard(null, currentId); }

window.addEventListener('DOMContentLoaded', () => loadCard());
</script>
{% endblock %}
