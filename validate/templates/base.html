<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{% block title %}FLoRA{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
{% block head %}{% endblock %}
</head>
<body>

<nav>
  <span class="brand">FLoRA</span>
  <a href="{{ url_for('dashboard.dashboard_page') }}"
     class="{{ 'active' if active_page == 'dashboard' else '' }}">Dashboard</a>
  <a href="{{ url_for('search_view.search_page') }}"
     class="{{ 'active' if active_page == 'search' else '' }}">Search</a>
  <a href="{{ url_for('filter_view.filter_page') }}"
     class="{{ 'active' if active_page == 'filter' else '' }}">Filter</a>
  <a href="{{ url_for('extract_view.extract_page') }}"
     class="{{ 'active' if active_page == 'extract' else '' }}">Extract</a>
  <a href="{{ url_for('extract_test_view.extract_page') }}"
     class="{{ 'active' if active_page == 'extract_test' else '' }}">Extract Test</a>
  <a href="/target-pending"
     class="{{ 'active' if active_page == 'target_pending' else '' }}">Target Pending</a>
  {% if session.reviewer_id %}
  <span style="margin-left:auto;color:#64748b;font-size:11px">
    {{ session.reviewer_id }}
    <a href="/set-name" style="color:#64748b;margin-left:6px">change</a>
  </span>
  {% endif %}
</nav>

{% block content %}{% endblock %}

{% block scripts %}{% endblock %}
</body>
</html>
