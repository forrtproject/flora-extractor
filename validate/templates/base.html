<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{% block title %}FLoRA{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
<!-- Apply saved theme before paint to avoid flash -->
<script>
  (function(){
    var t = localStorage.getItem('flora-theme');
    if (t === 'dark') document.documentElement.setAttribute('data-theme','dark');
  })();
</script>
{% block head %}{% endblock %}
</head>
<body>

<nav>
  <span class="brand">FLoRA</span>
  <a href="{{ url_for('dashboard.dashboard_page') }}"
     class="{{ 'active' if active_page == 'dashboard' else '' }}">Dashboard</a>
  <a href="{{ url_for('check.check_page') }}"
     class="{{ 'active' if active_page == 'check' else '' }}">Check</a>

  <button class="theme-toggle" id="themeToggle" title="Toggle light / dark mode" aria-label="Toggle theme">
    <span class="icon" id="themeIcon">🌙</span>
    <span id="themeLabel">Dark</span>
  </button>

  {% if session.reviewer_id %}
  <span class="nav-reviewer">
    {{ session.reviewer_id }}
    <a href="/set-name">change</a>
  </span>
  {% endif %}
</nav>

{% block content %}{% endblock %}

{% block scripts %}{% endblock %}

<script>
(function () {
  var toggle = document.getElementById('themeToggle');
  var icon   = document.getElementById('themeIcon');
  var label  = document.getElementById('themeLabel');
  var html   = document.documentElement;

  function applyTheme(dark) {
    if (dark) {
      html.setAttribute('data-theme', 'dark');
      icon.textContent  = '☀️';
      label.textContent = 'Light';
    } else {
      html.removeAttribute('data-theme');
      icon.textContent  = '🌙';
      label.textContent = 'Dark';
    }
  }

  // Sync button state with current theme on load
  applyTheme(html.getAttribute('data-theme') === 'dark');

  toggle.addEventListener('click', function () {
    var isDark = html.getAttribute('data-theme') === 'dark';
    applyTheme(!isDark);
    localStorage.setItem('flora-theme', isDark ? 'light' : 'dark');
  });
})();
</script>
</body>
</html>
