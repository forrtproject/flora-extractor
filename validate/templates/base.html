<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{% block title %}FLoRA{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
{% block head %}{% endblock %}
</head>
<body>

<nav>
  <span class="brand">FLoRA</span>
  <a href="{{ url_for('dashboard.dashboard_page') }}"
     class="{{ 'active' if active_page == 'dashboard' else '' }}">Dashboard</a>
  <a href="{{ url_for('review.validate_page') }}"
     class="{{ 'active' if active_page == 'validate' else '' }}">Validate</a>
  <a href="{{ url_for('input.input_page') }}"
     class="{{ 'active' if active_page == 'input' else '' }}">Input</a>
  <a href="{{ url_for('disambiguation.index') }}"
     class="{{ 'active' if active_page == 'disambiguation' else '' }}">Single DOI</a>
  <a href="{{ url_for('flora.flora_page') }}"
     class="{{ 'active' if active_page == 'flora' else '' }}">FLORA</a>
  <a href="{{ url_for('pipeline.pipeline_page') }}"
     class="{{ 'active' if active_page == 'pipeline' else '' }}">Pipeline</a>
  {% if session.reviewer_id %}
  <span style="margin-left:auto;color:#64748b;font-size:11px">
    {{ session.reviewer_id }}
    <a href="/set-name" style="color:#64748b;margin-left:6px">change</a>
  </span>
  {% endif %}
</nav>

{% block content %}{% endblock %}

{% block scripts %}{% endblock %}
</body>
</html>
